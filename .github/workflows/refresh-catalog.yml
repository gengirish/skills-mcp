name: Refresh skills catalog

on:
  schedule:
    # Daily at 06:00 UTC. Adjust as needed.
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Ignore SHA cache and refetch every repo"
        type: boolean
        default: false
      include_registry:
        description: "Include the giant claude-skill-registry source"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Restore catalog cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: skills-catalog-${{ runner.os }}-v1

      - name: Build catalog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          flags="--report"
          if [ "${{ inputs.force }}" = "true" ]; then flags="$flags --force"; fi
          if [ "${{ inputs.include_registry }}" = "true" ]; then flags="$flags --include-registry"; fi
          npm run build:catalog -- $flags

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet -- data/catalog.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit catalog
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "skills-catalog-bot"
          git config user.email "skills-catalog-bot@users.noreply.github.com"
          git add data/catalog.json
          git commit -m "chore: refresh catalog $(date -u +%Y-%m-%d)"
          git push

      - name: No-op summary
        if: steps.diff.outputs.changed != 'true'
        run: echo "Catalog unchanged; nothing to commit."
